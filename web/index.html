<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DionyHub | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased h-screen flex overflow-hidden relative">

    <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col shadow-2xl z-10">
        <div class="h-16 flex items-center px-6 border-b border-gray-700 bg-gray-900/50">
            <span class="text-xl font-bold tracking-wider text-indigo-400 drop-shadow-md">DionyHub</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <div class="px-2">
                <button onclick="toggleBoard()" class="w-full flex items-center justify-between px-4 py-2 bg-gray-700/50 border border-gray-600 rounded-md text-white font-medium shadow-inner transition-colors hover:bg-gray-700/80 group">
                    <span class="flex items-center gap-2">📋 Board</span>
                    <svg id="board-chevron" class="w-4 h-4 transform transition-transform duration-200 text-gray-400 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="tag-list" class="mt-2 space-y-1 pl-4 hidden overflow-hidden transition-all duration-300">
                    </div>
            </div>
            
            <a href="#" class="block px-6 py-2 text-gray-400 hover:bg-gray-700/30 hover:text-white rounded-md transition-colors mt-4">⚙️ Settings</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto bg-[#0f1115]">
        <header class="h-16 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-8 shadow-sm">
            <h2 class="text-lg font-semibold tracking-wide text-gray-200">Active Library</h2>
            
            <div class="flex items-center gap-6">
                <button onclick="openModal()" class="btn-action bg-indigo-600/90 hover:bg-indigo-500 text-white px-4 py-2 rounded-md shadow-lg shadow-indigo-900/20 text-sm font-medium flex items-center gap-2 border border-indigo-500/50">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Add Project
                </button>

                <div class="text-sm text-gray-400 flex items-center gap-2 border-l border-gray-700 pl-6">
                    System Status: 
                    <span class="relative flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    <span class="text-green-400 font-bold ml-1">Online</span>
                </div>
            </div>
        </header>

        <div class="p-8 pb-4">
            <div class="bg-gray-800/80 backdrop-blur-sm rounded-xl border border-gray-700 shadow-xl overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-900/80 text-gray-400 text-sm border-b border-gray-700 uppercase tracking-wider">
                            <th class="p-5 font-medium w-1/4">Project Name</th>
                            <th class="p-5 font-medium w-1/4">Path</th>
                            <th class="p-5 font-medium w-1/6">Status</th>
                            <th class="p-5 font-medium w-1/6">Usage</th>
                            <th class="p-5 font-medium text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="project-list">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="p-8 pt-0 flex-1 flex flex-col min-h-[300px]">
            <div class="bg-[#0a0a0c] rounded-xl border border-gray-700 shadow-xl flex-1 flex flex-col overflow-hidden">
                <header class="bg-gray-800/80 px-4 py-2 border-b border-gray-700 flex justify-between items-center">
                    <span class="text-xs font-mono text-gray-400 uppercase tracking-wider flex items-center gap-2">
                        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M4 18h16a2 2 0 002-2V6a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        Live Terminal
                    </span>
                    <button onclick="clearTerminal()" class="text-xs text-gray-500 hover:text-gray-300 transition-colors">Clear</button>
                </header>
                <div id="terminal-output" class="p-4 overflow-y-auto flex-1 font-mono text-sm text-green-400 whitespace-pre-wrap"></div>
            </div>
        </div>
    </main>

    <div id="addModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50 transition-opacity">
        <div class="bg-gray-800 border border-gray-700 rounded-xl w-full max-w-md shadow-2xl overflow-visible">
            <div class="p-6 border-b border-gray-700 bg-gray-900/50 flex justify-between items-center rounded-t-xl">
                <h3 class="text-lg font-semibold text-gray-200">Register New Project</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="addForm" class="p-6 space-y-4" onsubmit="submitNewProject(event)">
                <div>
                    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Project Name</label>
                    <input type="text" id="projName" required class="w-full bg-gray-900 border border-gray-600 rounded-md px-4 py-2 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" placeholder="e.g. Discord Bot">
                </div>
                
                <div>
                    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Absolute Path</label>
                    <input type="text" id="projPath" required class="w-full bg-gray-900 border border-gray-600 rounded-md px-4 py-2 text-white font-mono text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" placeholder="C:/Users/Diony/Desktop/bot">
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Execution Command</label>
                    <input type="text" id="projCmd" required value="go run main.go" class="w-full bg-gray-900 border border-gray-600 rounded-md px-4 py-2 text-white font-mono text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
                </div>

                <div class="relative">
                    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Category / Tag (Optional)</label>
                    <input type="text" id="projTag" autocomplete="off" class="w-full bg-gray-900 border border-gray-600 rounded-md px-4 py-2 text-white text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" placeholder="e.g. Bots, Utilities, Web">
                    <div id="tagDropdown" class="w-full mt-1 bg-gray-800 border border-gray-600 rounded-md shadow-inner hidden max-h-40 overflow-y-auto divide-y divide-gray-700/50 transition-all duration-200"></div>
                </div>

                <div class="flex items-center gap-3 pt-2">
                    <input type="checkbox" id="projInteractive" class="w-4 h-4 text-indigo-600 bg-gray-900 border-gray-600 rounded focus:ring-indigo-500 focus:ring-2">
                    <label for="projInteractive" class="text-sm text-gray-300">Requires Interactive Terminal (Windows CMD)</label>
                </div>

                <div class="pt-6 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 btn-action bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-md text-sm font-medium border border-gray-600">Cancel</button>
                    <button type="submit" class="flex-1 btn-action bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-md text-sm font-medium border border-indigo-500/50 shadow-lg shadow-indigo-900/20">Save Project</button>
                </div>
            </form>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50 transition-opacity">
        <div class="bg-gray-800 border border-gray-700 rounded-xl w-full max-w-md shadow-2xl overflow-visible">
            <div class="p-6 border-b border-gray-700 bg-gray-900/50 flex justify-between items-center rounded-t-xl">
                <h3 class="text-lg font-semibold text-gray-200">Edit Project</h3>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="editForm" class="p-6 space-y-4" onsubmit="submitEditProject(event)">
                <input type="hidden" id="editProjId">
                <div>
                    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Project Name</label>
                    <input type="text" id="editProjName" required class="w-full bg-gray-900 border border-gray-600 rounded-md px-4 py-2 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
                </div>
                
                <div>
                    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Absolute Path</label>
                    <input type="text" id="editProjPath" required class="w-full bg-gray-900 border border-gray-600 rounded-md px-4 py-2 text-white font-mono text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Execution Command</label>
                    <input type="text" id="editProjCmd" required class="w-full bg-gray-900 border border-gray-600 rounded-md px-4 py-2 text-white font-mono text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
                </div>

                <div class="relative">
                    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Category / Tag (Optional)</label>
                    <input type="text" id="editProjTag" autocomplete="off" class="w-full bg-gray-900 border border-gray-600 rounded-md px-4 py-2 text-white text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
                    <div id="editTagDropdown" class="w-full mt-1 bg-gray-800 border border-gray-600 rounded-md shadow-inner hidden max-h-40 overflow-y-auto divide-y divide-gray-700/50 transition-all duration-200"></div>
                </div>

                <div class="flex items-center gap-3 pt-2">
                    <input type="checkbox" id="editProjInteractive" class="w-4 h-4 text-indigo-600 bg-gray-900 border-gray-600 rounded focus:ring-indigo-500 focus:ring-2">
                    <label for="editProjInteractive" class="text-sm text-gray-300">Requires Interactive Terminal (Windows CMD)</label>
                </div>

                <div class="pt-6 flex gap-3">
                    <button type="button" onclick="closeEditModal()" class="flex-1 btn-action bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-md text-sm font-medium border border-gray-600">Cancel</button>
                    <button type="submit" class="flex-1 btn-action bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-md text-sm font-medium border border-indigo-500/50 shadow-lg shadow-indigo-900/20">Update Changes</button>
                </div>
            </form>
        </div>
    </div>

    <div id="deleteModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50 transition-opacity">
        <div class="bg-gray-800 border border-gray-700 rounded-xl w-full max-w-sm shadow-2xl overflow-hidden transform transition-all">
            <div class="p-6 text-center">
                <div class="w-16 h-16 rounded-full bg-red-500/20 flex items-center justify-center mx-auto mb-4 border border-red-500/30">
                    <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-gray-200 mb-2">Delete Project?</h3>
                <p class="text-sm text-gray-400 mb-6">Are you sure you want to permanently remove this project? If it is currently running, it will be forcefully stopped.</p>
                
                <div class="flex gap-3">
                    <button onclick="closeDeleteModal()" class="flex-1 btn-action bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-md text-sm font-medium border border-gray-600">Cancel</button>
                    <button id="confirmDeleteBtn" class="flex-1 btn-action bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-md text-sm font-medium border border-red-500/50 shadow-lg shadow-red-900/20">Yes, Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
