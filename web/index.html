<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DionyHub | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Rapid Trigger hissi veren keskin ve hızlı geçişler */
        .btn-action {
            transition: all 0.05s ease-in-out;
        }
        .btn-action:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased h-screen flex overflow-hidden">

    <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-gray-700">
            <span class="text-xl font-bold tracking-wider text-indigo-400">DionyHub</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="#" class="block px-4 py-2 bg-gray-700 rounded-md text-white font-medium">📋 Board</a>
            <a href="#" class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white rounded-md transition-colors">⚙️ Settings</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto">
        <header class="h-16 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-8">
            <h2 class="text-lg font-semibold">Active Library</h2>
            <div class="text-sm text-gray-400">System Status: <span class="text-green-400 font-bold">Online</span></div>
        </header>

        <div class="p-8">
            <div class="bg-gray-800 rounded-lg border border-gray-700 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-900/50 text-gray-400 text-sm border-b border-gray-700">
                            <th class="p-4 font-medium">Project Name</th>
                            <th class="p-4 font-medium">Path</th>
                            <th class="p-4 font-medium">Status</th>
                            <th class="p-4 font-medium text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="project-list">
                        <tr class="border-b border-gray-700/50 hover:bg-gray-700/20 transition-colors">
                            <td class="p-4 font-medium">PC Kapatma Zamanlayıcısı</td>
                            <td class="p-4 text-sm text-gray-400">C:/.../shutdown-timer</td>
                            <td class="p-4"><span class="px-2 py-1 bg-red-500/20 text-red-400 text-xs rounded-full border border-red-500/30">Stopped</span></td>
                            <td class="p-4 text-right space-x-2">
                                <button class="btn-action bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-md text-sm font-medium">Start</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

</body>
</html>
